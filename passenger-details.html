<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BT Express | Passenger Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="passenger-details.css" />
</head>
<body>
  <header class="page-header">
    <div class="container page-header-inner">
      <a href="index.html" class="page-brand">
        <img src="logo.png" alt="BT Express" class="page-logo">
        <span>Passenger Details</span>
      </a>
      <a href="schedule.html" class="back-btn">Back</a>
    </div>
  </header>

  <main class="page-shell">
    <div class="container">
      <section class="details-layout">
        <div class="details-card">
          <span class="badge">Step 3 of 5</span>
          <h1>Enter passenger information</h1>
          <p class="subtext">Fill in the correct personal details and pickup point for the reservation.</p>

          <form class="details-form">
            <div class="field-grid">
              <div class="field">
                <label for="fullName">Name</label>
                <input type="text" id="fullName" placeholder="Enter full name">
              </div>

              <div class="field">
                <label for="nic">NIC Number</label>
                <input type="text" id="nic" placeholder="Enter NIC number">
              </div>

              <div class="field">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter phone number">
              </div>

              <div class="field">
                <label for="mail">Mail</label>
                <input type="email" id="mail" placeholder="Enter email">
              </div>
            </div>

            <div class="field">
              <label for="pickupPoint">Pickup Point / Bus Stop</label>
              <select id="pickupPoint">
                <option>Select pickup point</option>
                <option>Batticaloa</option>
                <option>Urani</option>
                <option>Eravur</option>
                <option>Chenkalady</option>
                <option>Colombo</option>
              </select>
            </div>

            <button type="button" class="primary-btn" onclick="window.location.href='seat-selection.html'">Continue to Seat Selection</button>
          </form>
        </div>

        <aside class="summary-card">
          <h3>Current Trip</h3>
          <div class="info-row"><strong>Route</strong><span id="summaryRouteText">Batticaloa ⇄ Colombo</span></div>
          <div class="info-row"><strong>Type</strong><span>A/C</span></div>
          <div class="info-row"><strong>Date</strong><span>2026-03-31</span></div>
          <div class="info-row"><strong>Departure</strong><span>06:30 PM</span></div>
          <div class="info-row"><strong>Arrival</strong><span>03:30 AM</span></div>
        </aside>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
